<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Homesick</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════════════════════════
   CUSTOM PNG ICONS
   ═══════════════════════════════════════════════════════════════
   Save your drawn PNGs with these exact filenames in the root folder:
     icon-messages.png
     icon-photos.png
     icon-notes.png
     icon-tracker.png   (optional)
   The SVG fallback shows automatically if a PNG is missing.
   ═══════════════════════════════════════════════════════════════ */

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#fef9f0;font-family:'Patrick Hand',cursive;touch-action:manipulation;}

#wallpaper{position:fixed;inset:0;z-index:0;background:#fef9f0;
  background-image:linear-gradient(rgba(180,160,120,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(180,160,120,.07) 1px,transparent 1px);
  background-size:36px 36px;}
#wallpaper::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 25% 15%,rgba(255,220,160,.35) 0%,transparent 55%),
             radial-gradient(ellipse at 80% 85%,rgba(180,220,255,.25) 0%,transparent 50%),
             radial-gradient(ellipse at 60% 40%,rgba(255,200,220,.15) 0%,transparent 40%);}

#root{position:fixed;inset:0;z-index:1;}

/* HOME */
#home{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
  padding:clamp(14px,3.5vh,44px) 20px 20px;overflow-y:auto;}

.clock-time{font-family:'Caveat',cursive;font-size:clamp(60px,11vw,108px);font-weight:700;color:#2d2416;line-height:1;text-shadow:3px 3px 0 rgba(180,140,60,.18);}
.clock-date{font-family:'Patrick Hand',cursive;font-size:clamp(15px,2.6vw,22px);color:#6b5a3e;margin-top:4px;letter-spacing:.5px;}

/* DAY TRACKER */
.tracker-widget{display:flex;align-items:center;gap:clamp(12px,2.5vw,22px);background:rgba(255,255,255,.7);border:2.5px solid #c4a870;border-radius:22px;padding:clamp(12px,2.5vh,22px) clamp(18px,4.5vw,36px);margin-top:clamp(14px,3vh,30px);max-width:500px;width:100%;position:relative;}
.tracker-widget::after{content:'';position:absolute;inset:-5px;border-radius:26px;border:1.5px dashed rgba(180,140,60,.25);pointer-events:none;}
.tracker-icon-img{width:clamp(52px,9vw,76px);height:clamp(52px,9vw,76px);object-fit:contain;flex-shrink:0;}
.tracker-icon-svg{width:clamp(52px,9vw,76px);height:clamp(52px,9vw,76px);flex-shrink:0;display:none;}
.tracker-label{font-family:'Patrick Hand',cursive;font-size:clamp(13px,2.2vw,18px);color:#8a7a5e;}
.tracker-days{font-family:'Caveat',cursive;font-weight:700;font-size:clamp(36px,7vw,60px);color:#2d2416;line-height:1.05;}
.tracker-sub{font-family:'Patrick Hand',cursive;font-size:clamp(11px,1.8vw,15px);color:#a09070;margin-top:2px;}

/* ICONS */
.icons-row{display:flex;gap:clamp(22px,5.5vw,76px);align-items:flex-start;justify-content:center;margin-top:clamp(26px,5.5vh,66px);flex-wrap:wrap;}
.app-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;user-select:none;}
.app-icon-wrap:active .icon-el{transform:scale(.88)!important;}
.icon-png{width:clamp(84px,14.5vw,134px);height:clamp(84px,14.5vw,134px);object-fit:contain;transition:transform .18s;display:block;}
.icon-png:hover{transform:scale(1.08) rotate(-2deg);}
.icon-svg{width:clamp(84px,14.5vw,134px);height:clamp(84px,14.5vw,134px);display:none;align-items:center;justify-content:center;border-radius:24px;overflow:hidden;transition:transform .18s;}
.icon-svg:hover{transform:scale(1.08) rotate(-2deg);}
.icon-svg svg{width:100%;height:100%;}
.app-label{font-family:'Patrick Hand',cursive;font-size:clamp(13px,2.4vw,19px);color:#3d2e1a;text-align:center;text-shadow:0 1px 3px rgba(255,255,255,.9);}

/* APP SCREENS */
.app-screen{position:absolute;inset:0;background:#fefcf5;display:none;flex-direction:column;overflow:hidden;}
.app-screen.active{display:flex;}

.app-header{display:flex;align-items:center;padding:clamp(13px,2.4vh,22px) 20px clamp(10px,1.8vh,16px);border-bottom:2.5px solid #d4c4a0;background:#fef9f0;gap:14px;flex-shrink:0;}
.back-btn{font-family:'Patrick Hand',cursive;font-size:clamp(14px,2.3vw,19px);color:#6b5a3e;cursor:pointer;border:2px solid #c4a870;padding:8px 20px;border-radius:26px;background:#fff8e8;transition:background .15s;white-space:nowrap;}
.back-btn:hover{background:#ffefc0;}
.app-title-h{font-family:'Caveat',cursive;font-size:clamp(26px,4.8vw,40px);font-weight:700;color:#2d2416;flex:1;}
.app-content{flex:1;overflow-y:auto;padding:18px;}
.app-content::-webkit-scrollbar{width:5px;}
.app-content::-webkit-scrollbar-thumb{background:#d4c4a0;border-radius:4px;}

/* MESSAGES */
.msg-contact{display:flex;align-items:center;gap:16px;padding:clamp(14px,2.4vh,20px) 16px;border-radius:20px;border:2px solid #d4c4a0;background:#fffdf5;cursor:pointer;transition:background .15s;margin-bottom:12px;}
.msg-contact:hover{background:#fff8dc;}
.avatar{width:clamp(48px,7vw,60px);height:clamp(48px,7vw,60px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Caveat',cursive;font-size:clamp(18px,3vw,24px);font-weight:700;flex-shrink:0;border:2.5px solid rgba(0,0,0,.1);}
.contact-name{font-family:'Patrick Hand',cursive;font-size:clamp(16px,2.8vw,22px);color:#2d2416;font-weight:600;}
.contact-preview{font-size:clamp(13px,2.2vw,17px);color:#8a7a5e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;}

/* CHAT */
.chat-window{display:none;flex-direction:column;position:absolute;inset:0;background:#fefcf5;}
.chat-window.open{display:flex;}
.chat-header{display:flex;align-items:center;gap:14px;padding:clamp(13px,2.2vh,20px) 18px;border-bottom:2px solid #d4c4a0;background:#fef9f0;flex-shrink:0;}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;}
.bubble{max-width:74%;padding:clamp(11px,2vh,16px) clamp(16px,3.2vw,24px);border-radius:24px;font-size:clamp(15px,2.6vw,20px);line-height:1.5;}
.bubble.them{background:#e8e0cc;border:2px solid #c8b890;color:#2d2416;align-self:flex-start;border-bottom-left-radius:4px;}
.bubble.me{background:#4a7c59;border:2px solid #3a6045;color:#fff;align-self:flex-end;border-bottom-right-radius:4px;}
.bubble.guest{background:#d4e8ff;border:2px solid #94b8e0;color:#1a3050;align-self:flex-start;border-bottom-left-radius:4px;}
.bubble-meta{font-size:clamp(11px,1.8vw,14px);color:#a09070;margin-top:3px;align-self:flex-start;}
.name-row{display:flex;gap:10px;padding:8px 18px 0;flex-shrink:0;align-items:center;}
.name-input{border:2px solid #c4a870;border-radius:26px;padding:9px 18px;font-family:'Patrick Hand',cursive;font-size:clamp(14px,2.2vw,17px);background:#fffdf5;color:#2d2416;outline:none;width:200px;}
.gb-label{font-family:'Patrick Hand',cursive;font-size:clamp(12px,1.9vw,15px);color:#7a6a4e;}
.chat-input-row{display:flex;gap:10px;padding:clamp(10px,1.8vh,16px) 18px;border-top:2px solid #d4c4a0;background:#fef9f0;flex-shrink:0;align-items:flex-end;}
.chat-input{flex:1;border:2px solid #c4a870;border-radius:26px;padding:clamp(10px,1.8vh,15px) 18px;font-family:'Patrick Hand',cursive;font-size:clamp(15px,2.5vw,19px);background:#fffdf5;color:#2d2416;outline:none;resize:none;max-height:100px;line-height:1.4;}
.send-btn{background:#4a7c59;border:none;border-radius:50%;width:clamp(44px,7vw,58px);height:clamp(44px,7vw,58px);cursor:pointer;color:#fff;font-size:clamp(20px,3.5vw,28px);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(clamp(120px,20vw,200px),1fr));gap:9px;}
.photo-cell{aspect-ratio:1;border-radius:16px;border:2.5px solid #d4c4a0;overflow:hidden;cursor:pointer;transition:transform .15s;background:#f0e8d8;position:relative;}
.photo-cell:hover{transform:scale(1.04) rotate(.5deg);}
.photo-cell img,.photo-cell video{width:100%;height:100%;object-fit:cover;display:block;}
.vid-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.55);color:#fff;font-size:clamp(11px,1.7vw,14px);padding:3px 9px;border-radius:9px;font-family:'Patrick Hand',cursive;}
.empty-photos{text-align:center;padding:55px 24px;color:#a09070;font-size:clamp(15px,2.5vw,20px);line-height:1.9;}
.loading-msg{text-align:center;padding:30px;color:#a09070;font-size:clamp(14px,2.2vw,18px);font-family:'Patrick Hand',cursive;}

/* PHOTO VIEWER */
.photo-viewer{display:none;position:absolute;inset:0;background:rgba(20,14,6,.93);align-items:center;justify-content:center;flex-direction:column;gap:18px;z-index:20;}
.photo-viewer.open{display:flex;}
.photo-viewer img{max-width:90%;max-height:74vh;border-radius:18px;object-fit:contain;}
.photo-viewer-close{position:absolute;top:16px;right:18px;font-family:'Patrick Hand',cursive;font-size:clamp(14px,2.5vw,19px);color:#fff;cursor:pointer;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);border-radius:26px;padding:7px 20px;z-index:5;}
.viewer-caption{font-family:'Patrick Hand',cursive;color:#e8d8b8;font-size:clamp(14px,2.3vw,18px);text-align:center;padding:0 28px;}
.viewer-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.3);color:#fff;font-size:clamp(24px,4.5vw,40px);padding:14px 18px;border-radius:16px;cursor:pointer;z-index:5;}
.viewer-nav.left{left:12px;}.viewer-nav.right{right:12px;}

/* CUSTOM VIDEO PLAYER */
.custom-player{position:relative;width:90%;max-height:74vh;border-radius:18px;overflow:hidden;background:#111;}
.custom-player video{width:100%;display:block;border-radius:18px;cursor:pointer;max-height:65vh;}
.player-controls{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(20,14,6,.88));padding:28px 18px 16px;display:flex;flex-direction:column;gap:12px;border-radius:0 0 18px 18px;transition:opacity .35s;}
.custom-player.hide-ctrl .player-controls{opacity:0;pointer-events:none;}
.progress-wrap{position:relative;height:8px;background:rgba(255,255,255,.22);border-radius:20px;cursor:pointer;border:1.5px solid rgba(255,255,255,.12);}
.progress-fill{height:100%;background:#f5c842;border-radius:20px;transition:width .1s linear;position:relative;min-width:0;}
.progress-thumb{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:16px;height:16px;background:#fff;border-radius:50%;border:2.5px solid #c4a870;box-shadow:0 0 0 3px rgba(245,200,66,.3);}
.player-btn-row{display:flex;align-items:center;gap:14px;}
.player-btn{background:none;border:2px solid rgba(255,255,255,.3);border-radius:50%;width:clamp(38px,6vw,52px);height:clamp(38px,6vw,52px);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,3vw,22px);color:#fff;font-family:'Patrick Hand',cursive;transition:background .15s,transform .1s;flex-shrink:0;}
.player-btn:hover{background:rgba(255,255,255,.15);transform:scale(1.08);}
.player-btn:active{transform:scale(.93);}
.player-btn img{width:55%;height:55%;object-fit:contain;}
.player-time{font-family:'Patrick Hand',cursive;font-size:clamp(12px,2vw,15px);color:rgba(255,255,255,.8);margin-left:auto;}
.vol-wrap{display:flex;align-items:center;gap:8px;}
.vol-slider{-webkit-appearance:none;width:clamp(50px,8vw,80px);height:4px;border-radius:4px;background:rgba(255,255,255,.25);outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#f5c842;border:2px solid #c4a870;cursor:pointer;}

/* NOTES */
.note-card{background:#fffde8;border:2px solid #d4c490;border-radius:18px;padding:clamp(14px,2.4vh,20px) clamp(16px,3vw,22px);cursor:pointer;transition:background .15s;position:relative;margin-bottom:12px;}
.note-card::before{content:'';position:absolute;left:44px;top:0;bottom:0;border-left:1px solid #e8d8a0;}
.note-card:hover{background:#fff8c0;}
.note-title{font-family:'Caveat',cursive;font-size:clamp(22px,3.8vw,32px);font-weight:700;color:#2d2416;}
.note-body-prev{font-size:clamp(14px,2.4vw,19px);color:#7a6a4e;margin-top:5px;line-height:1.5;}
.note-date{font-size:clamp(12px,2vw,15px);color:#b0a080;margin-top:7px;}
.new-note-btn{display:flex;align-items:center;justify-content:center;padding:18px;border:2.5px dashed #c4a870;border-radius:18px;background:#fffdf5;cursor:pointer;font-family:'Patrick Hand',cursive;font-size:clamp(15px,2.5vw,20px);color:#8a7a5e;transition:background .15s;margin-top:6px;}
.new-note-btn:hover{background:#fff8dc;}
.note-editor{display:flex;flex-direction:column;height:100%;}
.note-ed-title{border:none;border-bottom:2px solid #d4c490;font-family:'Caveat',cursive;font-size:clamp(26px,4.5vw,40px);font-weight:700;padding:clamp(14px,2.4vh,20px) 18px;background:transparent;color:#2d2416;outline:none;flex-shrink:0;}
.note-ed-body{flex:1;border:none;font-family:'Patrick Hand',cursive;font-size:clamp(16px,2.7vw,22px);padding:clamp(14px,2.4vh,20px) 18px;background:transparent;color:#3d2e1a;outline:none;resize:none;line-height:2.15;background-image:linear-gradient(transparent,transparent calc(2.15em - 1px),#e8d8a0 calc(2.15em - 1px),#e8d8a0 2.15em);background-size:100% 2.15em;}
.note-actions{display:flex;gap:10px;padding:14px 18px;border-top:2px solid #d4c490;flex-shrink:0;background:#fef9f0;}
.note-act-btn{font-family:'Patrick Hand',cursive;font-size:clamp(14px,2.3vw,18px);padding:9px 22px;border-radius:26px;cursor:pointer;border:2px solid #c4a870;background:#fff8e8;color:#5a4a2e;}
.note-act-btn.primary{background:#4a7c59;border-color:#3a6045;color:#fff;}

.status-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(40,30,15,.88);color:#fff;font-family:'Patrick Hand',cursive;font-size:clamp(13px,2.2vw,17px);padding:10px 22px;border-radius:24px;z-index:100;opacity:0;transition:opacity .3s;pointer-events:none;}
.status-toast.show{opacity:1;}
</style>
</head>
<body>
<div id="wallpaper"></div>
<div id="root">

<!-- HOME -->
<div id="home">
  <div style="text-align:center;">
    <div class="clock-time" id="clock-time">9:41</div>
    <div class="clock-date" id="clock-date">Saturday, April 18</div>
  </div>

  <div class="tracker-widget">
    <img src="icon-tracker.png" class="tracker-icon-img icon-el" alt=""
      onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
    <div class="tracker-icon-svg">
      <svg viewBox="0 0 76 76" fill="none">
        <rect x="6" y="14" width="64" height="50" rx="9" fill="#fef0d4" stroke="#c47820" stroke-width="2.5"/>
        <rect x="6" y="14" width="20" height="50" rx="9" fill="#d4e8ff" stroke="#4a70c8" stroke-width="2"/>
        <circle cx="16" cy="39" r="7" fill="#f5c842" stroke="#c47820" stroke-width="2"/>
        <line x1="32" y1="26" x2="62" y2="26" stroke="#d4c4a0" stroke-width="2" stroke-linecap="round"/>
        <line x1="32" y1="37" x2="62" y2="37" stroke="#d4c4a0" stroke-width="2" stroke-linecap="round"/>
        <line x1="32" y1="48" x2="52" y2="48" stroke="#d4c4a0" stroke-width="2" stroke-linecap="round"/>
        <rect x="48" y="50" width="16" height="12" rx="3" fill="rgba(232,88,74,.12)" stroke="#e8584a" stroke-width="1.5" stroke-dasharray="3,2"/>
        <text x="56" y="59" text-anchor="middle" font-family="serif" font-size="8" fill="#e8584a">✦</text>
      </svg>
    </div>
    <div class="tracker-info">
      <div class="tracker-label">Days in country 🗺️</div>
      <div class="tracker-days" id="tracker-days">—</div>
      <div class="tracker-sub" id="tracker-sub">since Sep 16, 2025</div>
    </div>
  </div>

  <div class="icons-row">
    <div class="app-icon-wrap" onclick="openApp('messages')">
      <img src="icon-messages.png" class="icon-png icon-el" alt="Messages"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="icon-svg">
        <svg viewBox="0 0 120 120" fill="none">
          <rect x="4" y="4" width="112" height="112" rx="24" fill="#d4f0d8" stroke="#3a7a4a" stroke-width="3.5"/>
          <path d="M24 38 C23 37,24 33,27 32 L93 32 C96 32,97 34,97 38 L97 70 C97 73,96 75,93 75 L62 75 L46 90 L49 75 L27 75 C24 75,23 73,23 70 Z" fill="#fff" stroke="#3a7a4a" stroke-width="2.5" stroke-linejoin="round"/>
          <line x1="35" y1="47" x2="85" y2="46" stroke="#6ab87a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="35" y1="58" x2="78" y2="58" stroke="#6ab87a" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="35" y1="69" x2="66" y2="68" stroke="#6ab87a" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="app-label">Messages</div>
    </div>

    <div class="app-icon-wrap" onclick="openApp('photos')">
      <img src="icon-photos.png" class="icon-png icon-el" alt="Photos"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="icon-svg">
        <svg viewBox="0 0 120 120" fill="none">
          <rect x="4" y="4" width="112" height="112" rx="24" fill="#fff0d4" stroke="#c47820" stroke-width="3.5"/>
          <circle cx="60" cy="60" r="12" fill="#f5c842" stroke="#c47820" stroke-width="2.2"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#e8584a" stroke="#b04030" stroke-width="2" transform="rotate(0,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#f5924a" stroke="#c06030" stroke-width="2" transform="rotate(51.4,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#f5d840" stroke="#c09020" stroke-width="2" transform="rotate(102.8,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#5ac858" stroke="#3a9038" stroke-width="2" transform="rotate(154.2,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#4a90e8" stroke="#2a70c8" stroke-width="2" transform="rotate(205.6,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#a05ae0" stroke="#7040b0" stroke-width="2" transform="rotate(257,60,60)"/>
          <ellipse cx="60" cy="29" rx="11" ry="19" fill="#e85aa0" stroke="#c03880" stroke-width="2" transform="rotate(308.4,60,60)"/>
          <circle cx="60" cy="60" r="12" fill="#f5c842" stroke="#c47820" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="app-label">Photos</div>
    </div>

    <div class="app-icon-wrap" onclick="openApp('notes')">
      <img src="icon-notes.png" class="icon-png icon-el" alt="Notes"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
      <div class="icon-svg">
        <svg viewBox="0 0 120 120" fill="none">
          <rect x="4" y="4" width="112" height="112" rx="24" fill="#fffbd4" stroke="#b8a020" stroke-width="3.5"/>
          <rect x="24" y="18" width="72" height="84" rx="7" fill="#fffef0" stroke="#b8a020" stroke-width="2.5"/>
          <rect x="24" y="18" width="72" height="18" rx="7" fill="#f5d840" stroke="#b8a020" stroke-width="2"/>
          <circle cx="42" cy="27" r="5.5" fill="white" stroke="#b8a020" stroke-width="2"/>
          <circle cx="60" cy="27" r="5.5" fill="white" stroke="#b8a020" stroke-width="2"/>
          <circle cx="78" cy="27" r="5.5" fill="white" stroke="#b8a020" stroke-width="2"/>
          <line x1="33" y1="52" x2="87" y2="52" stroke="#d4c870" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="33" y1="65" x2="87" y2="64" stroke="#d4c870" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="33" y1="78" x2="87" y2="78" stroke="#d4c870" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="35" y1="52" x2="68" y2="52" stroke="#4a3a10" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="35" y1="65" x2="82" y2="64" stroke="#4a3a10" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="35" y1="78" x2="57" y2="78" stroke="#4a3a10" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="app-label">Notes</div>
    </div>
  </div>
</div>

<!-- MESSAGES APP -->
<div class="app-screen" id="app-messages">
  <div class="app-header">
    <div class="back-btn" onclick="goHome()">← Home</div>
    <div class="app-title-h">Messages</div>
  </div>
  <div class="app-content" id="msgs-list-view"><div id="msg-thread"></div></div>
  <div class="chat-window" id="chat-window">
    <div class="chat-header">
      <div class="back-btn" onclick="closeChat()">← Back</div>
      <div class="avatar" id="chat-avatar" style="background:#d4f0d8;color:#3a7a4a;">M</div>
      <div class="app-title-h" id="chat-name" style="font-size:clamp(20px,3.5vw,30px);">Mum</div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="name-row" id="name-row" style="display:none;">
      <input class="name-input" id="guest-name" placeholder="Your name…" maxlength="30"/>
      <span class="gb-label">sign your message ✏️</span>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-input" placeholder="Type a message…" rows="1"
        oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
      <button class="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<!-- PHOTOS APP -->
<div class="app-screen" id="app-photos">
  <div class="app-header">
    <div class="back-btn" onclick="goHome()">← Home</div>
    <div class="app-title-h">Photos</div>
  </div>
  <div class="app-content">
    <div id="photo-loading" class="loading-msg">Loading gallery… ✨</div>
    <div class="photo-grid" id="photo-grid" style="display:none;"></div>
    <div class="empty-photos" id="empty-photos" style="display:none;">
      <div style="font-size:56px;margin-bottom:18px;">📷</div>
      <div>No photos yet.<br/>Add images to your R2 bucket to show them here.</div>
    </div>
  </div>
  <div class="photo-viewer" id="photo-viewer">
    <div class="photo-viewer-close" onclick="closePhoto()">✕ Close</div>
    <div class="viewer-nav left" onclick="navPhoto(-1)">‹</div>
    <div id="photo-viewer-media"></div>
    <div class="viewer-caption" id="photo-viewer-caption"></div>
    <div class="viewer-nav right" onclick="navPhoto(1)">›</div>
  </div>
</div>

<!-- NOTES APP -->
<div class="app-screen" id="app-notes">
  <div class="app-header">
    <div class="back-btn" id="notes-back-btn" onclick="goHome()">← Home</div>
    <div class="app-title-h" id="notes-header-title">Notes</div>
  </div>
  <div class="app-content" id="notes-content"></div>
</div>

</div>
<div class="status-toast" id="toast"></div>

<script>
// ── CLOCK ──
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function updateClock(){
  const n=new Date();let h=n.getHours(),m=n.getMinutes();
  const ap=h>=12?'PM':'AM';h=h%12||12;
  document.getElementById('clock-time').textContent=h+':'+String(m).padStart(2,'0')+' '+ap;
  document.getElementById('clock-date').textContent=DAYS[n.getDay()]+', '+MONTHS[n.getMonth()]+' '+n.getDate();
}
updateClock();setInterval(updateClock,10000);

// ── DAY TRACKER ──
(function(){
  const diff=Math.max(0,Math.floor((new Date()-new Date('2025-09-16T00:00:00'))/(864e5)));
  document.getElementById('tracker-days').textContent=diff;
  document.getElementById('tracker-sub').textContent='since Sep 16, 2025 · '+Math.floor(diff/7)+'w '+diff%7+'d';
})();

// ── TOAST ──
function toast(msg,ms=2500){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

// ── NAV ──
function goHome(){
  document.getElementById('home').style.display='flex';
  document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));
  closeChat();closeNoteEditor();
}
function openApp(a){
  document.getElementById('home').style.display='none';
  document.querySelectorAll('.app-screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('app-'+a).classList.add('active');
  if(a==='messages')buildMsgThread();
  if(a==='photos')loadGallery();
  if(a==='notes')buildNotesList();
}

// ── MESSAGES ──
const privateChats=[
  {id:'mum',name:'Mum',bg:'#d4f0d8',col:'#3a7a4a',init:'M',msgs:[{s:'them',t:'Hey sweetheart! 👋'},{s:'them',t:'Did you eat yet? 🍱'},{s:'me',t:'Yes mum lol 😅'},{s:'them',t:'Good! Love you ❤️'}]},
  {id:'jamie',name:'Jamie',bg:'#d4e8ff',col:'#2a60c8',init:'J',msgs:[{s:'me',t:'u coming tmr?'},{s:'them',t:'yeah for sure 👍'},{s:'them',t:'haha ok ok see u tmr'}]},
  {id:'sara',name:'Sara',bg:'#f0d4ff',col:'#7040b0',init:'S',msgs:[{s:'them',t:'that café was amazing'},{s:'me',t:'right?? we need to go back'},{s:'them',t:'the coffee was SO good ☕'}]},
];
const GB='guestbook';
let currentChatId=null;

// Guestbook now stored via Cloudflare KV through API endpoint
async function fetchGuestMsgs(){
  try{
    const r=await fetch('/api/guestbook');
    if(!r.ok)throw new Error();
    return await r.json();
  }catch{
    // Fallback to localStorage if API unavailable (local dev)
    try{return JSON.parse(localStorage.getItem('gb_msgs')||'[]');}catch{return [];}
  }
}
async function postGuestMsg(name,text){
  const ts=new Date().toLocaleDateString('en-MY',{month:'short',day:'numeric'})+' '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
  const msg={name,t:text,time:ts};
  try{
    const r=await fetch('/api/guestbook',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(msg)});
    if(!r.ok)throw new Error();
  }catch{
    // Fallback: localStorage
    const msgs=JSON.parse(localStorage.getItem('gb_msgs')||'[]');msgs.push(msg);
    localStorage.setItem('gb_msgs',JSON.stringify(msgs));
  }
  return msg;
}

function buildMsgThread(){
  const w=document.getElementById('msg-thread');w.innerHTML='';
  const all=[...privateChats,{id:GB,name:'Guestbook 📖',bg:'#ffd4e8',col:'#a03060',init:'G',isGuest:true}];
  all.forEach(c=>{
    const prev=c.isGuest?'Loading…':c.msgs[c.msgs.length-1].t;
    const d=document.createElement('div');d.className='msg-contact';
    d.innerHTML=`<div class="avatar" style="background:${c.bg};color:${c.col};">${c.init}</div>
      <div style="flex:1;min-width:0;"><div class="contact-name">${c.name}</div>
      <div class="contact-preview" id="prev-${c.id}">${prev.substring(0,52)}</div></div>`;
    d.onclick=()=>openChat(c.id);w.appendChild(d);
    if(c.isGuest){
      fetchGuestMsgs().then(msgs=>{
        const p=document.getElementById('prev-'+GB);
        if(p)p.textContent=msgs.length?`${msgs[msgs.length-1].name||'Guest'}: ${msgs[msgs.length-1].t}`.substring(0,52):'Leave a message! ✨';
      });
    }
  });
}

async function openChat(id){
  currentChatId=id;const isGuest=id===GB;
  const box=document.getElementById('chat-messages');box.innerHTML='';
  let name,bg,col,init;
  if(isGuest){
    name='Guestbook 📖';bg='#ffd4e8';col='#a03060';init='G';
    box.innerHTML='<div style="text-align:center;padding:12px 16px;font-size:clamp(13px,2.2vw,17px);color:#8a7a5e;background:#fff8f0;border-radius:14px;margin-bottom:10px;line-height:1.6;">Leave a message for everyone to see! 🌸</div>';
    const msgs=await fetchGuestMsgs();
    msgs.forEach(m=>{
      const b=document.createElement('div');b.className='bubble guest';b.textContent=m.t;box.appendChild(b);
      const meta=document.createElement('div');meta.className='bubble-meta';meta.textContent=(m.name||'Anonymous')+' · '+m.time;box.appendChild(meta);
    });
    document.getElementById('name-row').style.display='flex';
    document.getElementById('chat-input').placeholder='Write your message…';
  }else{
    const c=privateChats.find(x=>x.id===id);name=c.name;bg=c.bg;col=c.col;init=c.init;
    c.msgs.forEach(m=>{const b=document.createElement('div');b.className='bubble '+m.s;b.textContent=m.t;box.appendChild(b);});
    document.getElementById('name-row').style.display='none';
    document.getElementById('chat-input').placeholder='Type a message…';
  }
  document.getElementById('chat-name').textContent=name;
  const av=document.getElementById('chat-avatar');av.textContent=init;av.style.background=bg;av.style.color=col;
  box.scrollTop=box.scrollHeight;
  document.getElementById('msgs-list-view').style.display='none';
  document.getElementById('chat-window').classList.add('open');
}
function closeChat(){document.getElementById('chat-window').classList.remove('open');document.getElementById('msgs-list-view').style.display='block';currentChatId=null;}

async function sendMsg(){
  const inp=document.getElementById('chat-input');const txt=inp.value.trim();if(!txt)return;
  inp.value='';inp.style.height='auto';
  const box=document.getElementById('chat-messages');
  if(currentChatId===GB){
    const gn=document.getElementById('guest-name').value.trim()||'Anonymous';
    const msg=await postGuestMsg(gn,txt);
    const b=document.createElement('div');b.className='bubble guest';b.textContent=txt;box.appendChild(b);
    const m2=document.createElement('div');m2.className='bubble-meta';m2.textContent=gn+' · '+msg.time;box.appendChild(m2);
    toast('Message saved! ✨');
  }else{
    const c=privateChats.find(x=>x.id===currentChatId);c.msgs.push({s:'me',t:txt});
    const b=document.createElement('div');b.className='bubble me';b.textContent=txt;box.appendChild(b);
    setTimeout(()=>{
      const r=['haha 😄','sounds good!','ok!','tell me more~','👍','got it!','aww 🥰'][Math.floor(Math.random()*7)];
      const rb=document.createElement('div');rb.className='bubble them';rb.textContent=r;box.appendChild(rb);
      c.msgs.push({s:'them',t:r});box.scrollTop=box.scrollHeight;
    },1200);
  }
  box.scrollTop=box.scrollHeight;
}

// ── PHOTOS — served from Cloudflare R2 via /api/media ──
let gallery=[];
let viewerIndex=0;

async function loadGallery(){
  document.getElementById('photo-loading').style.display='block';
  document.getElementById('photo-grid').style.display='none';
  document.getElementById('empty-photos').style.display='none';
  try{
    const r=await fetch('/api/media');
    if(!r.ok)throw new Error();
    gallery=await r.json(); // [{key,name,url,isVideo,caption}]
  }catch{
    gallery=[];
  }
  renderGallery();
}

function renderGallery(){
  document.getElementById('photo-loading').style.display='none';
  const grid=document.getElementById('photo-grid');
  const empty=document.getElementById('empty-photos');
  grid.innerHTML='';
  if(!gallery.length){empty.style.display='block';grid.style.display='none';return;}
  empty.style.display='none';grid.style.display='grid';
  gallery.forEach((item,i)=>{
    const cell=document.createElement('div');cell.className='photo-cell';
    if(item.isVideo){
      const vid=document.createElement('video');
      vid.src=item.url;vid.muted=true;vid.playsInline=true;
      vid.addEventListener('mouseenter',()=>vid.play());
      vid.addEventListener('mouseleave',()=>{vid.pause();vid.currentTime=0;});
      cell.appendChild(vid);
      const badge=document.createElement('div');badge.className='vid-badge';badge.textContent='▶ Video';cell.appendChild(badge);
    }else{
      const img=document.createElement('img');img.src=item.url;img.alt=item.name||item.key;img.loading='lazy';cell.appendChild(img);
    }
    cell.onclick=()=>openPhoto(i);grid.appendChild(cell);
  });
}

function openPhoto(i){viewerIndex=i;showViewer();}
function showViewer(){
  if(!gallery.length)return;
  viewerIndex=((viewerIndex%gallery.length)+gallery.length)%gallery.length;
  const item=gallery[viewerIndex];
  const md=document.getElementById('photo-viewer-media');md.innerHTML='';
  if(item.isVideo){
    buildVideoPlayer(item.url,md);
  }else{
    const img=document.createElement('img');img.src=item.url;img.alt=item.name||item.key;md.appendChild(img);
  }
  document.getElementById('photo-viewer-caption').textContent=(item.caption||item.name||item.key)+' ('+(viewerIndex+1)+'/'+gallery.length+')';
  document.getElementById('photo-viewer').classList.add('open');
}
function closePhoto(){
  const vid=document.querySelector('#photo-viewer-media video');if(vid){vid.pause();vid.src='';}
  document.getElementById('photo-viewer').classList.remove('open');
}
function navPhoto(d){
  const vid=document.querySelector('#photo-viewer-media video');if(vid)vid.pause();
  viewerIndex+=d;showViewer();
}

// ── CUSTOM VIDEO PLAYER ──
function buildVideoPlayer(src,container){
  container.innerHTML='';
  const wrap=document.createElement('div');wrap.className='custom-player';
  const vid=document.createElement('video');
  vid.src=src;vid.playsInline=true;vid.preload='metadata';

  const ctrl=document.createElement('div');ctrl.className='player-controls';

  // Progress
  const pw=document.createElement('div');pw.className='progress-wrap';
  const pf=document.createElement('div');pf.className='progress-fill';
  const pt=document.createElement('div');pt.className='progress-thumb';
  pf.appendChild(pt);pw.appendChild(pf);
  pw.addEventListener('click',e=>{
    const r=pw.getBoundingClientRect();
    if(vid.duration)vid.currentTime=((e.clientX-r.left)/r.width)*vid.duration;
  });

  // Buttons
  const row=document.createElement('div');row.className='player-btn-row';
  function mkBtn(label,title,onclick){
    const b=document.createElement('button');b.className='player-btn';b.title=title;
    // If custom PNG exists, swap: b.innerHTML=`<img src="icon-${label}.png" onerror="this.style.display='none';this.parentNode.textContent='${...}'"/>`;
    b.textContent=label==='play'?'▶':label==='pause'?'⏸':label==='rew'?'↺':'↻';
    b.onclick=onclick;return b;
  }
  const playBtn=document.createElement('button');playBtn.className='player-btn';playBtn.textContent='▶';
  playBtn.onclick=()=>vid.paused?vid.play():vid.pause();

  const rewBtn=mkBtn('rew','−10s',()=>vid.currentTime=Math.max(0,vid.currentTime-10));
  const fwdBtn=mkBtn('fwd','+10s',()=>vid.currentTime=Math.min(vid.duration||0,vid.currentTime+10));

  const timeEl=document.createElement('div');timeEl.className='player-time';timeEl.textContent='0:00 / 0:00';

  // Volume
  const vw=document.createElement('div');vw.className='vol-wrap';
  const vi=document.createElement('span');vi.textContent='🔊';vi.style.cssText='font-size:16px;cursor:pointer;';
  const vs=document.createElement('input');vs.type='range';vs.className='vol-slider';vs.min=0;vs.max=1;vs.step=0.05;vs.value=1;
  vs.oninput=()=>vid.volume=vs.value;
  vi.onclick=()=>{vid.muted=!vid.muted;vi.textContent=vid.muted?'🔇':'🔊';};
  vw.appendChild(vi);vw.appendChild(vs);

  // Fullscreen
  const fsBtn=document.createElement('button');fsBtn.className='player-btn';fsBtn.textContent='⤢';
  fsBtn.onclick=()=>{if(wrap.requestFullscreen)wrap.requestFullscreen();else if(wrap.webkitRequestFullscreen)wrap.webkitRequestFullscreen();};

  row.appendChild(playBtn);row.appendChild(rewBtn);row.appendChild(fwdBtn);row.appendChild(timeEl);row.appendChild(vw);row.appendChild(fsBtn);
  ctrl.appendChild(pw);ctrl.appendChild(row);

  function fmt(s){s=Math.floor(s||0);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  vid.ontimeupdate=()=>{
    const pct=vid.duration?(vid.currentTime/vid.duration*100):0;
    pf.style.width=pct+'%';
    timeEl.textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration);
  };

  let hideTimer;
  function showCtrl(){wrap.classList.remove('hide-ctrl');clearTimeout(hideTimer);if(!vid.paused)hideTimer=setTimeout(()=>wrap.classList.add('hide-ctrl'),3000);}

  vid.onplay=()=>{playBtn.textContent='⏸';showCtrl();};
  vid.onpause=()=>{playBtn.textContent='▶';wrap.classList.remove('hide-ctrl');};
  vid.onended=()=>{playBtn.textContent='▶';wrap.classList.remove('hide-ctrl');};
  vid.onclick=()=>{vid.paused?vid.play():vid.pause();};
  wrap.addEventListener('mousemove',showCtrl);
  wrap.addEventListener('touchstart',showCtrl,{passive:true});

  wrap.appendChild(vid);wrap.appendChild(ctrl);
  container.appendChild(wrap);
  vid.play().catch(()=>{});
}

// ── NOTES ──
const NK='handdrawn_notes_v1';
function getNotes(){try{return JSON.parse(localStorage.getItem(NK)||'null')||[{title:'Grocery list 🛒',body:'Eggs, milk, bread\nApples & bananas\nCoffee beans ☕',date:'Today'},{title:'Ideas ✨',body:'Build a hand-drawn UI\nLearn watercolour\nStart a sketchbook',date:'Yesterday'}];}catch{return [];}}
function setNotes(n){localStorage.setItem(NK,JSON.stringify(n));}
let editIdx=-1;
function buildNotesList(){
  editIdx=-1;document.getElementById('notes-back-btn').onclick=goHome;document.getElementById('notes-header-title').textContent='Notes';
  const notes=getNotes();const c=document.getElementById('notes-content');c.innerHTML='';
  notes.forEach((n,i)=>{
    const card=document.createElement('div');card.className='note-card';
    card.innerHTML=`<div class="note-title">${esc(n.title)}</div><div class="note-body-prev">${esc(n.body.substring(0,90))}${n.body.length>90?'…':''}</div><div class="note-date">${n.date}</div>`;
    card.onclick=()=>openNE(i);c.appendChild(card);
  });
  const nb=document.createElement('div');nb.className='new-note-btn';nb.textContent='+ New Note';nb.onclick=()=>openNE(-1);c.appendChild(nb);
}
function openNE(i){
  editIdx=i;const notes=getNotes();const note=i>=0?notes[i]:{title:'',body:''};
  document.getElementById('notes-header-title').textContent=i>=0?'Edit Note':'New Note';
  document.getElementById('notes-back-btn').onclick=buildNotesList;
  const c=document.getElementById('notes-content');c.innerHTML='';
  const ed=document.createElement('div');ed.className='note-editor';
  ed.innerHTML=`<input class="note-ed-title" id="ned-title" value="${esc(note.title)}" placeholder="Title…"/>
    <textarea class="note-ed-body" id="ned-body" placeholder="Start writing…">${esc(note.body)}</textarea>
    <div class="note-actions">
      <button class="note-act-btn" onclick="buildNotesList()">Cancel</button>
      ${i>=0?`<button class="note-act-btn" onclick="deleteNote(${i})">Delete</button>`:''}
      <button class="note-act-btn primary" onclick="saveNote()">Save</button>
    </div>`;
  c.appendChild(ed);
}
function saveNote(){
  const title=document.getElementById('ned-title').value.trim()||'Untitled';
  const body=document.getElementById('ned-body').value.trim();
  const notes=getNotes();const ds=new Date().toLocaleDateString('en-MY',{month:'short',day:'numeric'});
  if(editIdx>=0)notes[editIdx]={title,body,date:'Just now'};else notes.unshift({title,body,date:ds});
  setNotes(notes);buildNotesList();
}
function deleteNote(i){if(!confirm('Delete this note?'))return;const notes=getNotes();notes.splice(i,1);setNotes(notes);buildNotesList();}
function closeNoteEditor(){editIdx=-1;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

buildMsgThread();
</script>
