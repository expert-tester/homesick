<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Homesick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/doodle.css">
  <style>
    /* ═══════════════════════════════════════════════════════════════
   CUSTOM PNG ICONS
   ═══════════════════════════════════════════════════════════════
   Save your drawn PNGs with these exact filenames in the root folder:
     icon-messages.png
     icon-photos.png
     icon-notes.png
     icon-tracker.png   (optional)
   The SVG fallback shows automatically if a PNG is missing.
   ═══════════════════════════════════════════════════════════════ */

    /* CUSTOM FONT */
    @font-face {
      font-family: 'TrilHandwriting';
      src: url('assets/fonts/TrilHandwriting-Regular.otf') format('opentype'),
        url('assets/fonts/TrilHandwriting-Regular.ttf') format('trutype');
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: 'TrilHandwriting';
      touch-action: manipulation;
    }

    #wallpaper {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #ffffff;
      /* background-image: linear-gradient(rgba(180, 160, 120, .07) 1px, transparent 1px), linear-gradient(90deg, rgba(180, 160, 120, .07) 1px, transparent 1px); */
      background-size: 36px 36px;
    }

    #root {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* HOME */
    #home {
      transform: scale(1.2);
      display: flex;
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
      align-items: center;
      padding: clamp(16px, 4vh, 48px) 20px 20px;
      transition: opacity .3s, transform .3s;
    }

    .date-time-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 80px;
    }

    .clock-time {
      font-family: 'TrilHandwriting';
      font-size: clamp(64px, 12vw, 110px);
      font-weight: 700;
      color: #000000;
      line-height: 1;
    }

    .clock-date {
      font-family: 'TrilHandwriting';
      font-size: clamp(26px, 3.0vw, 33px);
      color: #000000;
      margin-top: 4px;
      letter-spacing: .5px;
    }

    .clock-countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'TrilHandwriting';
      font-size: clamp(16px, 2.9vw, 24px);
    }

    .clock-countdown .flag {
      width: 3vw;
      height: auto;
      object-fit: contain;
    }

    /* ICONS */
    .icons-row {
      display: flex;
      gap: clamp(24px, 6vw, 80px);
      align-items: flex-start;
      justify-content: center;
      /* margin-top: clamp(28px, 6vh, 70px); */
      flex-wrap: wrap;
    }

    .app-icon-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .app-icon-wrap:active .icon-el {
      transform: scale(.88) !important;
    }

    .app-icon {
      width: clamp(80px, 14vw, 130px);
      height: clamp(80px, 14vw, 130px);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .18s;
    }

    .app-icon:hover {
      transform: scale(1.07) rotate(-1.5deg);
    }

    .app-label {
      font-family: 'TrilHandwriting';
      font-size: clamp(13px, 2.4vw, 19px);
      color: #000000;
      text-align: center;
      text-shadow: 0 1px 3px rgba(255, 255, 255, .9);
    }

    /* APP SCREENS */
    .app-screen {
      position: absolute;
      inset: 0;
      background: #ffffff;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .app-screen.active {
      display: flex;
    }

    .app-header {
      display: flex;
      align-items: center;
      padding: 18px 16px;
      background: #ffffff;
      gap: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      font-family: 'TrilHandwriting';
      font-size: clamp(15px, 2vw, 25px);
      color: #000000;
      cursor: pointer;
      padding: 5px 14px;
      background: #ffffff;
      transition: background .15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .back-btn-img {
      width: 40px;
      height: auto;
      object-fit: contain;
    }

    .app-title-h {
      font-family: 'TrilHandwriting';
      font-size: clamp(26px, 4.8vw, 40px);
      font-weight: 700;
      color: #000000;
      flex: 1;
    }

    .app-content {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
    }

    .app-content::-webkit-scrollbar {
      width: 5px;
    }

    .app-content::-webkit-scrollbar-thumb {
      background: #ffffff;
      border-radius: 4px;
    }

    /* MESSAGES */
    /* MESSAGES */
    .msg-contact {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: clamp(14px, 2.4vh, 20px) 16px;
      border-radius: 20px;
      /* border: 2px solid #d4c4a0; */
      background: #ffffff;
      cursor: pointer;
      transition: background .15s;
      margin-bottom: 12px;
    }

    .msg-contact:hover {
      background: #ffffff;
    }

    .emoji {
      height: 3vw;
      width: 3vw;
      object-fit: contain;
      vertical-align: middle;
    }

    .avatar {
      width: clamp(48px, 7vw, 60px);
      height: clamp(48px, 7vw, 60px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'TrilHandwriting';
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 700;
      flex-shrink: 0;
      /* border: 2.5px solid #000000; */
      transform: scale(1.2);
    }

    .contact-name {
      font-family: 'TrilHandwriting';
      font-size: clamp(16px, 2.8vw, 22px);
      color: #000000;
      font-weight: 600;
    }

    .contact-preview {
      font-size: clamp(13px, 2.2vw, 17px);
      color: #000000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 3px;
    }

    /* CHAT */
    .chat-window {
      display: none;
      flex-direction: column;
      position: absolute;
      inset: 0;
      background: #ffffff;
    }

    .chat-window.open {
      display: flex;
    }

    /* Header with call icons */
    .chat-header {
      display: flex;
      align-items: center;
      gap: 1vw;
      padding: 18px 16px;
      background: #ffffff;
      flex-shrink: 0;
    }

    .chat-call-btns {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .call-btn {
      width: clamp(36px, 5.5vw, 48px);
      height: clamp(36px, 5.5vw, 48px);
      border-radius: 50%;
      border: 2px solid #000000;
      background: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 2.8vw, 22px);
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .call-btn-img {
      height: 2em;
      width: 2em;
      object-fit: contain;
      vertical-align: middle;
    }

    .call-btn:hover {
      background: #ffffff;
      transform: scale(1.08);
    }

    .call-btn:active {
      transform: scale(.93);
    }

    /* Message list */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 1vw;
    }

    .chat-img-viewer {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(15, 10, 5, .94);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 14px;
    }

    .chat-img-viewer.open {
      display: flex;
    }

    .chat-img-viewer img {
      max-width: 92vw;
      max-height: 82vh;
      border-radius: 16px;
      object-fit: contain;
    }

    .chat-img-viewer-close {
      position: absolute;
      top: 16px;
      right: 18px;
      font-family: 'TrilHandwriting';
      font-size: clamp(14px, 2.5vw, 18px);
      color: #fff;
      cursor: pointer;
      padding: 7px 20px;
    }

    /* Bubble wrapper — holds sender label + bubble + timestamp */
    .bubble-wrap {
      display: flex;
      flex-direction: column;
      max-width: 74%;
    }

    .bubble-wrap.wrap-me {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bubble-wrap.wrap-them {
      align-self: flex-start;
      align-items: flex-start;
    }

    .bubble-wrap.wrap-guest {
      align-self: flex-end;
      align-items: flex-end;
    }

    /* Sender name above bubble (them only) */
    .bubble-sender {
      font-family: 'TrilHandwriting';
      font-size: clamp(11px, 1.8vw, 14px);
      color: #000000;
      margin-bottom: 3px;
      padding-left: 4px;
    }

    /* The bubble itself */
    .bubble {
      padding: clamp(10px, 1.8vh, 15px) clamp(14px, 2.8vw, 22px);
      border-radius: 22px;
      font-size: clamp(15px, 2.6vw, 20px);
      line-height: 1.5;
      position: relative;
      max-width: 38vw;
    }

    .bubble.them {
      background: #ffffff;
      /* border: 2px solid #c8b890; */
      color: #000000;
      border-bottom-left-radius: 4px;
    }

    .bubble.me {
      background: #ffffff;
      /* border: 2px solid #3a6045; */
      color: #000000;
      border-bottom-right-radius: 4px;
    }

    .bubble.guest {
      background: #ffffff;
      /* border: 2px solid #94b8e0; */
      color: #000000;
      border-bottom-left-radius: 4px;
    }

    /* Timestamp below bubble, bottom-right aligned */
    .bubble-ts {
      font-family: 'TrilHandwriting';
      font-size: clamp(10px, 1vw, 28px);
      color: #000000;
      margin-top: 3px;
      padding-right: 4px;
      align-self: flex-end;
    }

    .bubble-wrap.wrap-them .bubble-ts,
    .bubble-wrap.wrap-guest .bubble-ts {
      align-self: flex-end;
      padding-right: 0;
      padding-left: 4px;
    }

    .bubble-img {
      max-width: clamp(160px, 38vw, 320px);
      max-height: clamp(160px, 30vh, 280px);
      width: auto;
      height: auto;
      border-radius: 14px;
      display: block;
      cursor: zoom-in;
      object-fit: cover;
      /* slight sketch border */
    }

    /* image bubbles have no background / padding — just the image */
    .bubble.img-bubble {
      background: none !important;
      border: none !important;
      padding: 0 !important;
    }

    .gb-label {
      font-family: 'TrilHandwriting';
      font-size: clamp(12px, 1.9vw, 15px);
      color: #000000;
    }

    /* ── DATE STAMP — iMessage style centred divider ── */
    .date-stamp {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 4px;
      align-self: stretch;
    }

    .date-stamp::before,
    .date-stamp::after {
      content: '';
      flex: 1;
      height: 1px;
    }

    .date-stamp-label {
      font-family: 'TrilHandwriting';
      font-size: clamp(16px, 2vw, 28px);
      color: #000000;
      white-space: nowrap;
      background: #ffffff;
      padding: 2px 10px;
    }

    /* Input row — only shown for guestbook */
    .chat-input-row {
      display: flex;
      gap: 10px;
      padding: clamp(10px, 1.8vh, 16px) 18px;
      background: #ffffff;
      flex-shrink: 0;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      /* border: 2px solid #c4a870; */
      /* border-radius: 26px; */
      padding: clamp(10px, 1.8vh, 15px) 18px;
      font-family: 'TrilHandwriting';
      font-size: clamp(15px, 2.5vw, 28px);
      background: #ffffff;
      color: #000000;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }

    .chat-input:focus {
      outline: none;
    }

    .send-btn {
      background: #ffffff;
      border: none;
      border-radius: 50%;
      width: clamp(44px, 7vw, 58px);
      height: clamp(44px, 7vw, 58px);
      cursor: pointer;
      /* color: #fff; */
      font-size: clamp(20px, 3.5vw, 28px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .send-btn img {
      width: 4vw;
      height: 4vw;
      display: block;
    }

    /* PHOTOS */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(clamp(120px, 20vw, 200px), 1fr));
      gap: 1vw;
    }

    .photo-cell {
      aspect-ratio: 1;
      border-radius: 16px;
      /* border: 2.5px solid #d4c4a0; */
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s;
      /* background: #f0e8d8; */
      position: relative;
    }

    .photo-cell:hover {
      transform: scale(1.04) rotate(.5deg);
    }

    .photo-cell img,
    .photo-cell video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .vid-badge {
      position: absolute;
      bottom: 6px;
      left: 6px;
      background: rgba(0, 0, 0, .55);
      color: #fff;
      font-size: clamp(11px, 1.7vw, 14px);
      padding: 3px 9px;
      border-radius: 9px;
      font-family: 'TrilHandwriting';
    }

    .empty-photos {
      text-align: center;
      padding: 55px 24px;
      color: #a09070;
      font-size: clamp(15px, 2.5vw, 20px);
      line-height: 1.9;
    }

    .loading-msg {
      text-align: center;
      padding: 30px;
      color: #a09070;
      font-size: clamp(14px, 2.2vw, 18px);
      font-family: 'TrilHandwriting';
    }

    /* PHOTO VIEWER */
    .photo-viewer {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(20, 14, 6, .93);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
      z-index: 20;
    }

    .photo-viewer.open {
      display: flex;
    }

    .photo-viewer img {
      max-width: 90%;
      max-height: 74vh;
      border-radius: 18px;
      object-fit: contain;
    }

    .photo-viewer-close {
      position: absolute;
      top: 16px;
      right: 18px;
      font-family: 'TrilHandwriting';
      color: #fff;
      cursor: pointer;
      padding: 7px 20px;
      z-index: 5;
    }

    .photo-viewer-close-img {
      width: 100px;
      height: auto;
      filter: invert(1);
    }

    .viewer-caption {
      font-family: 'TrilHandwriting';
      color: #e8d8b8;
      font-size: clamp(14px, 2.3vw, 18px);
      text-align: center;
      padding: 0 28px;
    }

    .viewer-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: #fff;
      padding: 14px 18px;
      cursor: pointer;
      z-index: 5;
    }

    .viewer-nav.left {
      left: 12px;
    }

    .viewer-nav.right {
      right: 12px;
    }

    /* CUSTOM VIDEO PLAYER */
    .custom-player {
      position: relative;
      width: 90%;
      max-height: 74vh;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
    }

    .custom-player video {
      width: 100%;
      display: block;
      border-radius: 18px;
      cursor: pointer;
      max-height: 65vh;
    }

    .player-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(20, 14, 6, .88));
      padding: 28px 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-radius: 0 0 18px 18px;
      transition: opacity .35s;
    }

    .custom-player.hide-ctrl .player-controls {
      opacity: 0;
      pointer-events: none;
    }

    .progress-wrap {
      position: relative;
      height: 8px;
      background: rgba(255, 255, 255, .22);
      border-radius: 20px;
      cursor: pointer;
      border: 1.5px solid rgba(255, 255, 255, .12);
    }

    .progress-fill {
      height: 100%;
      background: #f5c842;
      border-radius: 20px;
      transition: width .1s linear;
      position: relative;
      min-width: 0;
    }

    .progress-thumb {
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      border: 2.5px solid #c4a870;
      box-shadow: 0 0 0 3px rgba(245, 200, 66, .3);
    }

    .player-btn-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .player-btn {
      background: none;
      border: 2px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      width: clamp(38px, 6vw, 52px);
      height: clamp(38px, 6vw, 52px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 3vw, 22px);
      color: #fff;
      font-family: 'TrilHandwriting';
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }

    .player-btn:hover {
      background: rgba(255, 255, 255, .15);
      transform: scale(1.08);
    }

    .player-btn:active {
      transform: scale(.93);
    }

    .player-btn img {
      width: 55%;
      height: 55%;
      object-fit: contain;
    }

    .player-time {
      font-family: 'TrilHandwriting';
      font-size: clamp(12px, 2vw, 15px);
      color: rgba(255, 255, 255, .8);
      margin-left: auto;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vol-slider {
      -webkit-appearance: none;
      width: clamp(50px, 8vw, 80px);
      height: 4px;
      border-radius: 4px;
      background: rgba(255, 255, 255, .25);
      outline: none;
      cursor: pointer;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f5c842;
      border: 2px solid #c4a870;
      cursor: pointer;
    }

    .center-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      color: white;
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    /* NOTES */
    .note-card {
      background: #ffffff;
      /* border: 2px solid #d4c490; */
      border-radius: 18px;
      padding: clamp(14px, 2.4vh, 20px) clamp(16px, 3vw, 22px);
      cursor: pointer;
      transition: background .15s;
      position: relative;
      margin-bottom: 12px;
    }

    .note-card::before {
      content: '';
      position: absolute;
      left: 44px;
      top: 0;
      bottom: 0;
      /* border-left: 1px solid #e8d8a0; */
    }

    .note-card:hover {
      background: #ffffff;
    }

    .note-title {
      font-family: 'TrilHandwriting';
      font-size: clamp(16px, 3vw, 26px);
      font-weight: 700;
      color: #000000;
    }

    .note-body-prev {
      font-size: clamp(14px, 2.4vw, 19px);
      color: #000000;
      margin-top: 5px;
      line-height: 1.5;
    }

    .note-date {
      font-size: clamp(12px, 2vw, 15px);
      color: #000000;
      margin-top: 7px;
    }

    .new-note-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      border: 2.5px dashed #000000;
      border-radius: 18px;
      background: #ffffff;
      cursor: pointer;
      font-family: 'TrilHandwriting';
      font-size: clamp(15px, 2.5vw, 20px);
      color: #000000;
      transition: background .15s;
      margin-top: 6px;
    }

    .new-note-btn:hover {
      background: #ffffff;
    }

    .note-editor {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .note-ed-title {
      border: none;
      border-bottom: 2px solid #000000;
      font-family: 'TrilHandwriting';
      font-size: clamp(26px, 4.5vw, 40px);
      font-weight: 700;
      padding: clamp(14px, 2.4vh, 20px) 18px;
      background: transparent;
      color: #000000;
      outline: none;
      flex-shrink: 0;
    }

    .note-full {
      flex: 1;
      border: none;
      font-family: 'TrilHandwriting';
      font-size: clamp(16px, 2.7vw, 22px);
      padding: clamp(14px, 2.4vh, 20px) 18px;
      background: transparent;
      color: #000000;
      outline: none;
      resize: none;
      line-height: 2.15;
      /* background-image: linear-gradient(transparent, transparent calc(2.15em - 1px), #e8d8a0 calc(2.15em - 1px), #e8d8a0 2.15em); */
      background-size: 100% 2.15em;
    }

    .note-actions {
      display: flex;

    // ── CLOCK ──
    const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

    function formatTime(date, timeZone) {
      const time = new Intl.DateTimeFormat('en-GB', {
        timeZone,
        hour: 'numeric',
        minute: '2-digit',
        hour12: true
      }).format(date);

      const d = new Intl.DateTimeFormat('en-GB', {
        timeZone,
        weekday: 'long',
        day: 'numeric',
        month: 'long'
      }).formatToParts(date);

      const weekday = d.find(x => x.type === 'weekday').value;
      const day = d.find(x => x.type === 'day').value;
      const month = d.find(x => x.type === 'month').value;

      return {
        time,
        date: `${weekday}, ${month} ${day}`
      };
    }

    function updateClock() {
      const now = new Date();

      // 🇲🇾 Malaysia (MYT)
      const mls = formatTime(now, 'Asia/Kuala_Lumpur');
      document.getElementById('clock-mls-time').textContent = mls.time;
      document.getElementById('clock-mls-date').textContent = mls.date;

      // 🇬🇧 UK (GMT/BST automatically handled)
      const uk = formatTime(now, 'Europe/London');
      document.getElementById('clock-uk-time').textContent = uk.time;
      document.getElementById('clock-uk-date').textContent = uk.date;
    }

    setInterval(updateClock, 1000);
    updateClock();

    function updateDays() {
      const startDate = new Date("2025-09-16");
      const now = new Date();

      const diffTime = now - startDate;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

      document.getElementById("clock-countdown-text").textContent =
        diffDays + " days in";

    function nowTs() {

    // ── Guestbook API ──
    async function fetchGuestMsgs() {
      try {
        const r = await fetch('/api/guestbook');
        if (!r.ok) throw new Error();
        return await r.json();
      } catch {
        try { return JSON.parse(localStorage.getItem('gb_msgs') || '[]'); } catch { return []; }
      }
    }
    async function postGuestMsg(name, text) {
      const ts = nowDateTs();
      const msg = { name, t: text, time: ts };
      try {
        const r = await fetch('/api/guestbook', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(msg)
        });
        if (!r.ok) throw new Error();
      } catch {
        const msgs = JSON.parse(localStorage.getItem('gb_msgs') || '[]');
        msgs.push(msg); localStorage.setItem('gb_msgs', JSON.stringify(msgs));
      }
      return msg;
    }

    // ── Render a single bubble wrap (sender label + bubble + timestamp) ──
    function makeBubble({ side, sender, text, img, content, timestamp }) {
      // side: 'me' | 'them' | 'guest'
      const wrap = document.createElement('div');
      wrap.className = `bubble-wrap wrap-${side}`;

      // Sender name (only for 'them' / 'guest', when sender is provided)
      if ((side === 'them' || side === 'guest') && sender) {
        const sEl = document.createElement('div');
        sEl.className = 'bubble-sender';
        sEl.textContent = sender;
        wrap.appendChild(sEl);
      }

      // Build a normalised content array from whatever was passed:
      //   content: [...]           → use as-is
      //   t: 'string' or t: [...]  → convert to content
      //   img: 'url'               → convert to content
      //   mix of t + img           → text first (legacy fallback)
      let items = [];
      if (content) {
        items = content;
      } else {
        if (text) {
          const lines = Array.isArray(text) ? text : [text];
          lines.forEach(line => items.push({ t: line }));
        }
        if (img) items.push({ img });
      }

      // Track whether any image was rendered — used for timestamp placement
      let lastImgEl = null;

      items.forEach((item, idx) => {
        const isLast = idx === items.length - 1;

        if (item.t) {
          const b = document.createElement('div');
          b.className = `bubble ${side} doodle-border`;
          b.textContent = item.t;
          b.style.marginBottom = isLast ? '0' : '4px';
          wrap.appendChild(b);
          lastImgEl = null; // last rendered item is text, not image
        }

        if (item.img) {
          const bImg = document.createElement('div');
          bImg.className = `bubble ${side} img-bubble`;
          bImg.style.marginBottom = isLast ? '0' : '4px';
          const image = document.createElement('img');
          image.className = 'bubble-img doodle-border';
          image.src = item.img;
          image.alt = 'shared image';
          image.onerror = () => {
            bImg.innerHTML = '';
            bImg.className = `bubble ${side} doodle-border`;
            bImg.style.cssText = 'opacity:.55;font-size:clamp(12px,2vw,15px);';
            bImg.textContent = '🖼️ image not found — check file path';
          };
          image.onclick = (e) => { e.stopPropagation(); openChatImg(item.img); };
          bImg.appendChild(image);
          wrap.appendChild(bImg);
          lastImgEl = bImg; // track the most recent image container
        }
      });

      // Timestamp — always one, at the very end
      if (timestamp) {
        const ts = document.createElement('div');
        ts.className = 'bubble-ts';
        ts.textContent = timestamp;
        if (lastImgEl) {
          // Last item was an image (or image was last rendered) → pin inside it
          ts.style.cssText = 'display:block;text-align:right;margin-top:3px;';
          lastImgEl.appendChild(ts);
        } else {
          // Last item was text → append to wrap as normal
          wrap.appendChild(ts);
        }
      }

      return wrap;
    }

    // ── CUSTOM VIDEO PLAYER ──
    function buildVideoPlayer(src, container) {
      container.innerHTML = '';
      const wrap = document.createElement('div');
      wrap.className = 'custom-player';
      const overlay = document.createElement('div'); // center overlay
      overlay.className = 'center-overlay';
      const vid = document.createElement('video');
      vid.src = src;
      vid.playsInline = true;
      vid.preload = 'metadata';

      const ctrl = document.createElement('div'); ctrl.className = 'player-controls';

      // Progress
      const pw = document.createElement('div'); pw.className = 'progress-wrap';
      const pf = document.createElement('div'); pf.className = 'progress-fill';
      const pt = document.createElement('div'); pt.className = 'progress-thumb';
      pf.appendChild(pt); pw.appendChild(pf);
      pw.addEventListener('click', e => {
        const r = pw.getBoundingClientRect();
        if (vid.duration) vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
      });

      // Buttons
      const row = document.createElement('div'); row.className = 'player-btn-row';
      function mkBtn(label, title, onclick) {
        const b = document.createElement('button'); b.className = 'player-btn'; b.title = title;
        // If custom PNG exists, swap: b.innerHTML=`<img src="icon-${label}.png" onerror="this.style.display='none';this.parentNode.textContent='${...}'"/>`;
        b.textContent = label === 'play' ? '▶' : label === 'pause' ? '⏸' : label === 'rew' ? '↺' : '↻';
        b.onclick = onclick; return b;
      }
      const playBtn = document.createElement('button'); playBtn.className = 'player-btn'; playBtn.textContent = '▶';
      playBtn.onclick = () => vid.paused ? vid.play() : vid.pause();

      // const rewBtn = mkBtn('rew', '−10s', () => vid.currentTime = Math.max(0, vid.currentTime - 10));
      // const fwdBtn = mkBtn('fwd', '+10s', () => vid.currentTime = Math.min(vid.duration || 0, vid.currentTime + 10));

      const timeEl = document.createElement('div'); timeEl.className = 'player-time'; timeEl.textContent = '0:00 / 0:00';

      // Volume
      const vw = document.createElement('div'); vw.className = 'vol-wrap';
      const vi = document.createElement('span'); vi.textContent = '🔊'; vi.style.cssText = 'font-size:16px;cursor:pointer;';
      const vs = document.createElement('input'); vs.type = 'range'; vs.className = 'vol-slider'; vs.min = 0; vs.max = 1; vs.step = 0.05; vs.value = 1;
      vs.oninput = () => vid.volume = vs.value;
      vi.onclick = () => { vid.muted = !vid.muted; vi.textContent = vid.muted ? '🔇' : '🔊'; };
      vw.appendChild(vi); vw.appendChild(vs);

      // Fullscreen
      const fsBtn = document.createElement('button'); fsBtn.className = 'player-btn'; fsBtn.textContent = '⤢';
      fsBtn.onclick = () => { if (wrap.requestFullscreen) wrap.requestFullscreen(); else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen(); };

      row.appendChild(playBtn);
      // row.appendChild(rewBtn);    // deleted
      // row.appendChild(fwdBtn);     // deleted
      row.appendChild(timeEl);
      row.appendChild(vw);
      row.appendChild(fsBtn);
      ctrl.appendChild(pw);
      ctrl.appendChild(row);

      function fmt(s) { s = Math.floor(s || 0); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }
      vid.ontimeupdate = () => {
        const pct = vid.duration ? (vid.currentTime / vid.duration * 100) : 0;
        pf.style.width = pct + '%';
        timeEl.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
      };

      let hideTimer;
      function showCtrl() { wrap.classList.remove('hide-ctrl'); clearTimeout(hideTimer); if (!vid.paused) hideTimer = setTimeout(() => wrap.classList.add('hide-ctrl'), 3000); }

      // Play Pause Center Image Function
      function flashOverlay(type) {
        if (type == 'play') {
          overlay.innerHTML = '<img src="assets/images/pause.png">';
        } else if (type == 'pause') {
          overlay.innerHTML = '<img src="assets/images/play.png">';
        }
        overlay.style.opacity = '1';
        clearTimeout(overlay._timer);
        overlay._timer = setTimeout(() => overlay.style.opacity = '0', 700);
      }

      vid.onplay = () => { playBtn.textContent = '⏸'; showCtrl(); flashOverlay('play') };
      vid.onpause = () => { playBtn.textContent = '▶'; wrap.classList.remove('hide-ctrl'); flashOverlay('pause') };
      vid.onended = () => { playBtn.textContent = '▶'; wrap.classList.remove('hide-ctrl'); };
      vid.onclick = () => { vid.paused ? vid.play() : vid.pause(); };
      wrap.addEventListener('mousemove', showCtrl);
      wrap.addEventListener('touchstart', showCtrl, { passive: true });

      wrap.appendChild(vid);
      wrap.appendChild(ctrl);
      wrap.appendChild(overlay);
      container.appendChild(wrap);
      vid.play().catch(() => { });
    }

            return `
        <label style="display:flex; gap:8px; align-items:center;">
          <input type="checkbox" disabled
            ${item.done ? "checked" : ""}
            onchange="toggleCheck(${n.idx}, ${i})">
          <span>${esc(item.text)}</span>
        </label>
      `;
          }).join("") +

          `</div>`;
      }
